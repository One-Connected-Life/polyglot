# Kamal deploy for the language-app Dutch drill.
#
# Shares the Hetzner box with oneconnectedlife, promise-tracker,
# connectiongames (kamal-proxy on :80/:443, Host-routed) and quizzes
# (bare IP :8080). We follow the quizzes pattern: skip kamal-proxy and
# bind directly to host :8082. Bare IP, HTTP — no domain, no TLS.
# Reachable at http://178.104.104.237:8082
#
# (HTTPS/a domain only becomes necessary when we add mic-based "speak your
# answer" — browsers block getUserMedia on insecure origins.)

service: language-app

# Kamal prepends registry.server (ghcr.io). Personal namespace = bluemihai.
image: bluemihai/language-app

ssh:
  user: deploy

servers:
  web:
    hosts:
      - 178.104.104.237
    # proxy: false is REQUIRED — kamal-proxy registration is on by default in
    # Kamal v2 and would healthcheck container :80 via the shared proxy,
    # colliding with the neighbours. We publish straight to the host instead.
    proxy: false
    options:
      publish:
        - "8082:80"

registry:
  server: ghcr.io
  username: bluemihai
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true

# Persist SQLite (production.sqlite3 + solid_* DBs) across deploys.
# Container path matches Rails' storage/ dir.
volumes:
  - "language_app_storage:/rails/storage"

# Mihai builds on arm64 Mac; Hetzner runs amd64. Explicit arch required.
builder:
  arch: amd64
