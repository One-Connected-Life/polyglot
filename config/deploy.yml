# Kamal deploy for Polyglot (the language drill; serves on mynewwords.org).
#
# Shares the Hetzner box with oneconnectedlife, promise-tracker,
# connectiongames (kamal-proxy on :80/:443, Host-routed) and quizzes
# (bare IP :8080). We follow the quizzes pattern: skip kamal-proxy and
# bind directly to host :8082. Bare IP, HTTP — no domain, no TLS.
# Reachable at http://178.104.104.237:8082
#
# (HTTPS/a domain only becomes necessary when we add mic-based "speak your
# answer" — browsers block getUserMedia on insecure origins.)

service: polyglot

# Kamal prepends registry.server (ghcr.io). Personal namespace = bluemihai.
image: bluemihai/polyglot

ssh:
  user: deploy

servers:
  web:
    hosts:
      - 178.104.104.237

# Route through the shared kamal-proxy (same one oneconnectedlife.org uses on
# this box). Host-based routing means many apps share :80/:443 without
# colliding — each registers its own host. The proxy also handles rolling
# new->old swaps on internal ports, so there's no fixed host-port clash on
# redeploy (the old `proxy: false` + `8082:80` publish did clash — see
# reference_polyglot_kamal_redeploy_port). kamal-proxy auto-provisions a
# Let's Encrypt cert for the host below (needs DNS-only A record -> this box).
proxy:
  ssl: true
  host: mynewwords.org

registry:
  server: ghcr.io
  username: bluemihai
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - ANTHROPIC_API_KEY   # AI deck generation (Mihai's key; per-user cap guards cost)
    - GOOGLE_CLIENT_ID      # Google social login (#9)
    - GOOGLE_CLIENT_SECRET  # Google social login (#9)
  clear:
    SOLID_QUEUE_IN_PUMA: true
    FSRS_ENABLED: 1   # FSRS scheduling + retire-and-celebrate + ease (#5). Flipped on 2026-06-20.

# Persist SQLite (production.sqlite3 + solid_* DBs) across deploys.
# Container path matches Rails' storage/ dir.
volumes:
  - "polyglot_storage:/rails/storage"

# Mihai builds on arm64 Mac; Hetzner runs amd64. Explicit arch required.
builder:
  arch: amd64
